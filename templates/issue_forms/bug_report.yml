name: Bug report
description: Report a problem following the GitHub Well-Architected Framework
labels:
  - type:bug
  - priority:medium
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping us maintain a secure and reliable GitHub ecosystem. Please provide enough detail for us to triage quickly.
  - type: dropdown
    id: pillar
    attributes:
      label: Impacted pillar
      description: Which WAF pillar is primarily affected?
      options:
        - Application Security
        - Architecture
        - Collaboration
        - Governance
        - Productivity
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Provide a concise summary of the defect.
      placeholder: Critical AWS IAM permission missing in workflow
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Include links to failing runs, repository paths, and commit SHAs.
      placeholder: |
        1. Checkout commit abc123
        2. Run terraform apply
        3. Observe failure in GitHub Actions
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected outcome
      description: Describe the desired behavior once the issue is resolved.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual outcome
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: mitigations
    attributes:
      label: Interim mitigations
      description: Document any short-term mitigations already in place.
  - type: checkboxes
    id: safeguards
    attributes:
      label: Safeguards
      options:
        - label: Security review completed
        - label: Terraform plan attached
        - label: GitHub Actions run linked
