# WAF: OIDC-based deployment workflow
# Replaces long-lived static credentials (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
# with short-lived OIDC tokens, following the WAF Application Security pillar guidance
# on eliminating hardcoded credentials.
#
# Setup requirements:
#   1. Configure your cloud provider's OIDC trust policy to trust GitHub Actions.
#   2. Set the IAM_ROLE_ARN (or equivalent) as a repository/environment secret.
#   3. Adjust the `aws-region` and resource paths for your deployment target.
#
# References:
#   - https://wellarchitected.github.com/library/application-security/recommendations/
#   - https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments

name: OIDC Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# WAF: Minimal required permissions; id-token is needed for OIDC federation only
# at the job level — set to 'none' here to prevent accidental top-level token grants
permissions:
  contents: read
  id-token: none

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write  # Required for OIDC token exchange

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # WAF: Use OIDC to authenticate with AWS — no long-lived credentials stored in secrets
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Deploy to staging
        run: |
          echo "Deploying to staging using OIDC-federated credentials..."
          # Example: aws s3 sync dist s3://your-staging-bucket

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    # WAF: Require successful staging deployment before promoting to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write  # Required for OIDC token exchange

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # WAF: Use OIDC to authenticate with AWS — no long-lived credentials stored in secrets
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Deploy to production
        run: |
          echo "Deploying to production using OIDC-federated credentials..."
          # Example: aws s3 sync dist s3://your-production-bucket
