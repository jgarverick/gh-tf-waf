name: CI/CD Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# WAF: Minimal required permissions following principle of least privilege
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        # WAF: Use 'npm ci' for reproducible installs; requires a committed package-lock.json
        run: npm ci
      - name: Run linters
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build project
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # WAF: Use environment protection rules for deployment gating
    environment: staging
    permissions:
      contents: read
      # WAF: id-token permission required for OIDC federation
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Deploy to staging
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to staging environment..."
          # Add deployment steps here
          # Example: Deploy to AWS S3 using OIDC credentials (see oidc_deploy.yml)
          # aws s3 sync dist s3://your-staging-bucket
      - name: Deploy to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to production environment..."
          # Add deployment steps here
          # Example: Deploy to AWS S3 using OIDC credentials (see oidc_deploy.yml)
          # aws s3 sync dist s3://your-production-bucket
